# JVM heap — MediaPipe + ML Kit are large deps, need room to compile
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# AndroidX is already used throughout the project.
# Jetifier must be DISABLED — enabling it causes Jetifier to try (and fail)
# to migrate MediaPipe's AAR which is already AndroidX-compatible and uses
# newer bytecode that Jetifier's ASM transformer cannot process.
android.useAndroidX=true
android.enableJetifier=false

# Build performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
