name: vision_assistant
description: Offline Vision Assistant for Visually Impaired Users

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0
  image: ^4.1.7
  path_provider: ^2.1.2
  path: ^1.9.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
